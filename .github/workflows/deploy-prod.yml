# Автодеплой прода: пуш в main → по SSH выполнить deploy.sh prod.
# Также можно запустить руками из вкладки Actions (workflow_dispatch).
#
# ВАЖНО: пуш в main = выкат на прод. Ветка main должна быть закрыта
# branch protection (изменения только через одобренный PR) — иначе прод
# катит любой, у кого есть право пуша.
#
# SSH-ключ — ОТДЕЛЬНЫЙ от staging-ключа, на сервере ограничен форс-командой
# (умеет только deploy.sh prod). Требуемые secrets (без них джоба тихо
# пропустится):
#   DEPLOY_HOST          — IP/хост сервера Timeweb
#   DEPLOY_USER          — deploy (создаёт server/bootstrap.sh)
#   DEPLOY_PROD_SSH_KEY  — приватный ключ прод-деплоя
name: deploy-prod

on:
  push:
    branches: [main]
  workflow_dispatch:

# Один деплой за раз; новый пуш ждёт завершения предыдущего
concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PROD_SSH_KEY: ${{ secrets.DEPLOY_PROD_SSH_KEY }}
    steps:
      - name: Deploy prod over SSH
        if: ${{ env.DEPLOY_HOST != '' && env.DEPLOY_PROD_SSH_KEY != '' }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_PROD_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=15 \
              "${DEPLOY_USER}@${DEPLOY_HOST}" \
              'cd /opt/rumi/be && ./deploy.sh prod'

      - name: Skipped (нет секретов прод-деплоя)
        if: ${{ env.DEPLOY_HOST == '' || env.DEPLOY_PROD_SSH_KEY == '' }}
        run: echo "Секреты прод-деплоя не заданы — пропускаем."
