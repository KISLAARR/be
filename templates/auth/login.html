{% extends "base.html" %}

{% block title %}Вход | Руми{% endblock %}

{% block content %}

<section style="padding: 60px 0; background: #f9fafb; min-height: 70vh;">
    <div class="section-container">
        <div style="max-width: 400px; margin: 0 auto;">
            
            <div style="text-align: center; margin-bottom: 32px;">
                <h1 style="font-size: 1.75rem; font-weight: 700; margin-bottom: 8px;">Вход</h1>
                <p style="color: #6B7280; font-size: 0.9rem;">Войдите, чтобы управлять записями</p>
            </div>
            
            <div style="background: white; border: 1px solid #e5e7eb; border-radius: 16px; padding: 28px;">
                
                <div id="error-message" style="display: none; background: #fef2f2; color: #ef4444; border-radius: 10px; padding: 12px; margin-bottom: 16px; font-size: 0.875rem;"></div>
                
                <form id="login-form" onsubmit="handleLogin(event)">
                    <div style="margin-bottom: 16px;">
                        <label style="font-weight: 500; font-size: 0.875rem; margin-bottom: 6px; display: block;">Телефон</label>
                        <input type="tel" id="phone" name="phone" placeholder="+79998887766" required
                               style="width: 100%; border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px 14px; font-size: 0.9rem; outline: none; box-sizing: border-box;"
                               onfocus="this.style.borderColor='#F28C6F'" onblur="this.style.borderColor='#e5e7eb'">
                    </div>
                    
                    <div style="margin-bottom: 20px;">
                        <label style="font-weight: 500; font-size: 0.875rem; margin-bottom: 6px; display: block;">Пароль</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required
                               style="width: 100%; border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px 14px; font-size: 0.9rem; outline: none; box-sizing: border-box;"
                               onfocus="this.style.borderColor='#F28C6F'" onblur="this.style.borderColor='#e5e7eb'">
                    </div>
                    
                    <button type="submit" 
                            style="width: 100%; border: none; border-radius: 9999px; padding: 14px; font-size: 0.9rem; font-weight: 600; color: white; cursor: pointer; background: linear-gradient(135deg, #F28C6F, #E8A0BF);">
                        Войти
                    </button>
                </form>
                
                <p style="text-align: center; margin-top: 16px; color: #6B7280; font-size: 0.875rem;">
                    Нет аккаунта? <a href="/register" style="color: #F28C6F; text-decoration: none; font-weight: 500;">Зарегистрироваться</a>
                </p>
            </div>
        </div>
    </div>
</section>

<script>
async function handleLogin(event) {
    event.preventDefault();
    
    const phone = document.getElementById('phone').value;
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('error-message');
    
    errorDiv.style.display = 'none';
    
    try {
        const response = await fetch('/api/v1/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone, password })
        });
        
        if (response.ok) {
            const data = await response.json();
            const token = data.access_token;
            
            // Сохраняем токен
            localStorage.setItem('rumi_token', token);
            
            // Загружаем профиль пользователя
            try {
                const userResponse = await fetch('/api/v1/users/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (userResponse.ok) {
                    const userData = await userResponse.json();
                    localStorage.setItem('rumi_user_id', userData.id);
                    localStorage.setItem('rumi_user_name', userData.full_name || 'Пользователь');
                    console.log('Профиль загружен:', userData.full_name, 'ID:', userData.id);
                } else {
                    console.log('Ошибка загрузки профиля:', userResponse.status);
                }
            } catch (e) {
                console.log('Не удалось загрузить профиль:', e);
            }
            
            // Перенаправляем
            const redirect = localStorage.getItem('rumi_redirect_after_login') || '/profile';
            localStorage.removeItem('rumi_redirect_after_login');
            window.location.href = redirect;
            
        } else {
            const error = await response.json();
            errorDiv.textContent = error.detail || 'Неверный телефон или пароль';
            errorDiv.style.display = 'block';
        }
    } catch (e) {
        errorDiv.textContent = 'Ошибка соединения с сервером';
        errorDiv.style.display = 'block';
    }
}
</script>
{% endblock %}
