{% extends "base.html" %}

{% block title %}Вход | Руми{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="section-container">
        <div class="auth-container">
            
            <div class="auth-header">
                <h1 class="auth-title">Вход</h1>
                <p class="auth-subtitle">Войдите, чтобы управлять записями</p>
            </div>
            
            <div class="auth-card">
                <div id="error-message" class="auth-error" style="display: none;"></div>
                
                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="auth-form-group">
                        <label class="auth-label" for="phone">Телефон</label>
                        <input type="tel" id="phone" name="phone" placeholder="+79998887766" required class="auth-input">
                    </div>
                    
                    <div class="auth-form-group" style="margin-bottom: 20px;">
                        <label class="auth-label" for="password">Пароль</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required class="auth-input">
                    </div>
                    
                    <button type="submit" class="auth-button">
                        Войти
                    </button>
                </form>
                
                <p class="auth-footer-text">
                    Нет аккаунта? <a href="/register" class="auth-link">Зарегистрироваться</a>
                </p>
            </div>
        </div>
    </div>
</section>

<script>
async function handleLogin(event) {
    event.preventDefault();
    
    const phone = document.getElementById('phone').value;
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('error-message');
    
    errorDiv.style.display = 'none';
    
    try {
        const response = await fetch('/api/v1/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone, password })
        });
        
        if (response.ok) {
            const data = await response.json();
            const token = data.access_token;
            
            // Сохраняем токен
            localStorage.setItem('rumi_token', token);
            
            // Загружаем профиль пользователя
            try {
                const userResponse = await fetch('/api/v1/users/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (userResponse.ok) {
                    const userData = await userResponse.json();
                    localStorage.setItem('rumi_user_id', userData.id);
                    localStorage.setItem('rumi_user_name', userData.full_name || 'Пользователь');
                    console.log('Профиль загружен:', userData.full_name, 'ID:', userData.id);
                } else {
                    console.log('Ошибка загрузки профиля:', userResponse.status);
                }
            } catch (e) {
                console.log('Не удалось загрузить профиль:', e);
            }
            
            // Перенаправляем
            const redirect = localStorage.getItem('rumi_redirect_after_login') || '/profile';
            localStorage.removeItem('rumi_redirect_after_login');
            window.location.href = redirect;
            
        } else {
            const error = await response.json();
            errorDiv.textContent = error.detail || 'Неверный телефон или пароль';
            errorDiv.style.display = 'block';
        }
    } catch (e) {
        errorDiv.textContent = 'Ошибка соединения с сервером';
        errorDiv.style.display = 'block';
    }
}
</script>
{% endblock %}
