{% extends "base.html" %}

{% block title %}Регистрация | Руми{% endblock %}

{% block content %}

<section style="padding: 60px 0; background: #f9fafb; min-height: 70vh;">
    <div class="section-container">
        <div style="max-width: 400px; margin: 0 auto;">
            
            <div style="text-align: center; margin-bottom: 32px;">
                <h1 style="font-size: 1.75rem; font-weight: 700; margin-bottom: 8px;">Регистрация</h1>
                <p style="color: #6B7280; font-size: 0.9rem;">Создайте аккаунт для быстрой записи</p>
            </div>
            
            <div style="background: white; border: 1px solid #e5e7eb; border-radius: 16px; padding: 28px;">
                
                <div id="error-message" style="display: none; background: #fef2f2; color: #ef4444; border-radius: 10px; padding: 12px; margin-bottom: 16px; font-size: 0.875rem;"></div>
                <div id="success-message" style="display: none; background: #f0fdf4; color: #10b981; border-radius: 10px; padding: 12px; margin-bottom: 16px; font-size: 0.875rem;"></div>
                
                <form id="register-form" onsubmit="handleRegister(event)">
                    <div style="margin-bottom: 14px;">
                        <label style="font-weight: 500; font-size: 0.875rem; margin-bottom: 6px; display: block;">Имя</label>
                        <input type="text" id="full_name" name="full_name" placeholder="Анна Иванова" required
                               style="width: 100%; border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px 14px; font-size: 0.9rem; outline: none; box-sizing: border-box;"
                               onfocus="this.style.borderColor='#F28C6F'" onblur="this.style.borderColor='#e5e7eb'">
                    </div>
                    
                    <div style="margin-bottom: 14px;">
                        <label style="font-weight: 500; font-size: 0.875rem; margin-bottom: 6px; display: block;">Телефон</label>
                        <input type="tel" id="phone" name="phone" placeholder="+79998887766" required
                               style="width: 100%; border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px 14px; font-size: 0.9rem; outline: none; box-sizing: border-box;"
                               onfocus="this.style.borderColor='#F28C6F'" onblur="this.style.borderColor='#e5e7eb'">
                    </div>
                    
                    <div style="margin-bottom: 14px;">
                        <label style="font-weight: 500; font-size: 0.875rem; margin-bottom: 6px; display: block;">Email (необязательно)</label>
                        <input type="email" id="email" name="email" placeholder="anna@example.com"
                               style="width: 100%; border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px 14px; font-size: 0.9rem; outline: none; box-sizing: border-box;"
                               onfocus="this.style.borderColor='#F28C6F'" onblur="this.style.borderColor='#e5e7eb'">
                    </div>
                    
                    <div style="margin-bottom: 20px;">
                        <label style="font-weight: 500; font-size: 0.875rem; margin-bottom: 6px; display: block;">Пароль (минимум 6 символов)</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required minlength="6"
                               style="width: 100%; border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px 14px; font-size: 0.9rem; outline: none; box-sizing: border-box;"
                               onfocus="this.style.borderColor='#F28C6F'" onblur="this.style.borderColor='#e5e7eb'">
                    </div>
                    
                    <button type="submit" 
                            style="width: 100%; border: none; border-radius: 9999px; padding: 14px; font-size: 0.9rem; font-weight: 600; color: white; cursor: pointer; background: linear-gradient(135deg, #F28C6F, #E8A0BF);">
                        Зарегистрироваться
                    </button>
                </form>
                
                <p style="text-align: center; margin-top: 16px; color: #6B7280; font-size: 0.875rem;">
                    Уже есть аккаунт? <a href="/login" style="color: #F28C6F; text-decoration: none; font-weight: 500;">Войти</a>
                </p>
            </div>
        </div>
    </div>
</section>

<script>
async function handleRegister(event) {
    event.preventDefault();
    
    const errorDiv = document.getElementById('error-message');
    const successDiv = document.getElementById('success-message');
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';
    
    const data = {
        phone: document.getElementById('phone').value,
        full_name: document.getElementById('full_name').value,
        password: document.getElementById('password').value,
        role: 'client'
    };
    
    const email = document.getElementById('email').value;
    if (email) data.email = email;
    
    try {
        const response = await fetch('/api/v1/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        
        if (response.ok) {
            successDiv.textContent = 'Регистрация успешна! Перенаправляем на вход...';
            successDiv.style.display = 'block';
            setTimeout(() => {
                window.location.href = '/login';
            }, 1500);
        } else {
            const error = await response.json();
            errorDiv.textContent = error.detail || 'Ошибка при регистрации';
            errorDiv.style.display = 'block';
        }
    } catch (e) {
        errorDiv.textContent = 'Ошибка соединения с сервером';
        errorDiv.style.display = 'block';
    }
}
</script>
{% endblock %}
