{% extends "base.html" %}

{% block title %}Регистрация | Руми{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="section-container">
        <div class="auth-container">
            
            <div class="auth-header">
                <h1 class="auth-title">Регистрация</h1>
                <p class="auth-subtitle">Создайте аккаунт для быстрой записи</p>
            </div>
            
            <div class="auth-card">
                <div id="error-message" class="auth-error" style="display: none;"></div>
                <div id="success-message" class="auth-success" style="display: none;"></div>
                
                <form id="register-form" onsubmit="handleRegister(event)">
                    <div class="auth-form-group">
                        <label class="auth-label" for="full_name">Имя</label>
                        <input type="text" id="full_name" name="full_name" placeholder="Анна Иванова" required class="auth-input">
                    </div>
                    
                    <div class="auth-form-group">
                        <label class="auth-label" for="phone">Телефон</label>
                        <input type="tel" id="phone" name="phone" placeholder="+79998887766" required class="auth-input">
                    </div>
                    
                    <div class="auth-form-group">
                        <label class="auth-label" for="email">Email (необязательно)</label>
                        <input type="email" id="email" name="email" placeholder="anna@example.com" class="auth-input">
                    </div>
                    
                    <div class="auth-form-group" style="margin-bottom: 20px;">
                        <label class="auth-label" for="password">Пароль (минимум 6 символов)</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required minlength="6" class="auth-input">
                    </div>
                    
                    <button type="submit" class="auth-button">
                        Зарегистрироваться
                    </button>
                </form>
                
                <p class="auth-footer-text">
                    Уже есть аккаунт? <a href="/login" class="auth-link">Войти</a>
                </p>
            </div>
        </div>
    </div>
</section>

<script>
async function handleRegister(event) {
    event.preventDefault();
    
    const errorDiv = document.getElementById('error-message');
    const successDiv = document.getElementById('success-message');
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';
    
    const data = {
        phone: document.getElementById('phone').value,
        full_name: document.getElementById('full_name').value,
        password: document.getElementById('password').value,
        role: 'client'
    };
    
    const email = document.getElementById('email').value;
    if (email) data.email = email;
    
    try {
        const response = await fetch('/api/v1/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        
        if (response.ok) {
            successDiv.textContent = 'Регистрация успешна! Перенаправляем на вход...';
            successDiv.style.display = 'block';
            setTimeout(() => {
                window.location.href = '/login';
            }, 1500);
        } else {
            const error = await response.json();
            errorDiv.textContent = error.detail || 'Ошибка при регистрации';
            errorDiv.style.display = 'block';
        }
    } catch (e) {
        errorDiv.textContent = 'Ошибка соединения с сервером';
        errorDiv.style.display = 'block';
    }
}
</script>
{% endblock %}
