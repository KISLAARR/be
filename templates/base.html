<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Руми{% endblock %}</title>
    <style>
        :root {
            --color-primary: #F28C6F;
            --color-secondary: #E8A0BF;
            --color-accent-light: rgba(242, 140, 111, 0.13);
            --color-surface: #FFFFFF;
            --color-surface-alt: #F9FAFB;
            --color-background: #F9FAFB;
            --color-border: #E5E7EB;
            --color-heading: #111827;
            --color-muted: #6B7280;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', 'Inter', sans-serif; 
            background: var(--color-background); 
            color: var(--color-heading);
        }
        
        .app-layout {
            display: flex;
            min-height: 100vh;
        }
        
        .main-content {
            flex: 1;
            min-width: 0;
        }
        
        .sidebar {
            width: 256px;
            background: var(--color-surface);
            border-left: 1px solid var(--color-border);
            position: fixed;
            right: 0;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 40;
            display: none;
        }
        
        @media (min-width: 1024px) {
            .main-content {
                padding-right: 256px;
            }
            .sidebar {
                display: block;
            }
        }
        
        .section-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .section-py { padding: 80px 0; }
        .text-display { font-weight: 700; letter-spacing: -0.02em; }
        .text-body { color: var(--color-muted); }
        .text-label { font-weight: 600; }
        .text-subtitle { font-weight: 600; color: var(--color-heading); }
        .btn-primary {
            background: var(--color-primary);
            color: white;
            padding: 10px 24px;
            border-radius: 9999px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            transition: transform 0.2s;
        }
        .btn-primary:hover { transform: scale(1.05); }
        .bg-surface { background: var(--color-surface); }
        .bg-surface-alt { background: var(--color-surface-alt); }
        .border-border { border-color: var(--color-border); }
        .border-t { border-top: 1px solid var(--color-border); }
        .border-b { border-bottom: 1px solid var(--color-border); }
        .text-muted { color: var(--color-muted); }
        .text-heading { color: var(--color-heading); }
        .text-on-dark-muted { color: rgba(0,0,0,0.5); }
        .text-display-on-dark { color: var(--color-heading); }
        .bg-accent-light { background: var(--color-accent-light); }
        .rounded-full { border-radius: 9999px; }
        .rounded-xl { border-radius: 0.75rem; }
        .rounded-2xl { border-radius: 1rem; }
        .rounded-3xl { border-radius: 1.5rem; }
        .shadow-lg { box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .backdrop-blur-sm { backdrop-filter: blur(8px); }
        .blur-2xl { filter: blur(40px); }
        .blur-3xl { filter: blur(64px); }
        
        .grid { display: grid; }
        .gap-3 { gap: 0.75rem; }
        .gap-4 { gap: 1rem; }
        .gap-6 { gap: 1.5rem; }
        .gap-8 { gap: 2rem; }
        .gap-10 { gap: 2.5rem; }
        .space-y-1 > * + * { margin-top: 0.25rem; }
        .space-y-3 > * + * { margin-top: 0.75rem; }
        .space-y-4 > * + * { margin-top: 1rem; }
        .text-center { text-align: center; }
        .text-left { text-align: left; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .flex-wrap { flex-wrap: wrap; }
        .items-start { align-items: flex-start; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .flex-1 { flex: 1; }
        .shrink-0 { flex-shrink: 0; }
        .mt-1 { margin-top: 4px; }
        .mt-3 { margin-top: 12px; }
        .mt-4 { margin-top: 16px; }
        .mt-6 { margin-top: 24px; }
        .mt-12 { margin-top: 48px; }
        .mb-1 { margin-bottom: 4px; }
        .mb-2 { margin-bottom: 8px; }
        .mb-3 { margin-bottom: 12px; }
        .mb-4 { margin-bottom: 16px; }
        .mb-5 { margin-bottom: 20px; }
        .mb-6 { margin-bottom: 24px; }
        .mb-8 { margin-bottom: 32px; }
        .mb-10 { margin-bottom: 40px; }
        .mb-20 { margin-bottom: 80px; }
        .p-1\.5 { padding: 0.375rem; }
        .p-3 { padding: 0.75rem; }
        .p-5 { padding: 1.25rem; }
        .p-6 { padding: 1.5rem; }
        .p-8 { padding: 2rem; }
        .px-3 { padding-left: 0.75rem; padding-right: 0.75rem; }
        .px-4 { padding-left: 1rem; padding-right: 1rem; }
        .px-5 { padding-left: 1.25rem; padding-right: 1.25rem; }
        .px-7 { padding-left: 1.75rem; padding-right: 1.75rem; }
        .py-1 { padding-top: 0.25rem; padding-bottom: 0.25rem; }
        .py-1\.5 { padding-top: 0.375rem; padding-bottom: 0.375rem; }
        .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
        .py-2\.5 { padding-top: 0.625rem; padding-bottom: 0.625rem; }
        .py-3\.5 { padding-top: 0.875rem; padding-bottom: 0.875rem; }
        .py-4 { padding-top: 1rem; padding-bottom: 1rem; }
        .py-8 { padding-top: 2rem; padding-bottom: 2rem; }
        .pt-4 { padding-top: 1rem; }
        .pt-5 { padding-top: 1.25rem; }
        .pt-8 { padding-top: 2rem; }
        .pt-24 { padding-top: 6rem; }
        .pt-40 { padding-top: 10rem; }
        .pb-24 { padding-bottom: 6rem; }
        .max-w-lg { max-width: 32rem; }
        .max-w-2xl { max-width: 42rem; }
        .max-w-3xl { max-width: 48rem; }
        .mx-auto { margin-left: auto; margin-right: auto; }
        .hidden { display: none; }
        .fixed { position: fixed; }
        .sticky { position: sticky; }
        .overflow-hidden { overflow: hidden; }
        .overflow-y-auto { overflow-y: auto; }
        .relative { position: relative; }
        .absolute { position: absolute; }
        .inset-0 { top: 0; right: 0; bottom: 0; left: 0; }
        .inset-x-0 { left: 0; right: 0; }
        .top-0 { top: 0; }
        .right-0 { right: 0; }
        .bottom-0 { bottom: 0; }
        .left-0 { left: 0; }
        .z-0 { z-index: 0; }
        .z-10 { z-index: 10; }
        .z-30 { z-index: 30; }
        .w-full { width: 100%; }
        .h-full { height: 100%; }
        .h-screen { height: 100vh; }
        .h-5 { height: 1.25rem; }
        .w-5 { width: 1.25rem; }
        .h-12 { height: 3rem; }
        .w-12 { width: 3rem; }
        .h-16 { height: 4rem; }
        .w-16 { width: 4rem; }
        .text-xs { font-size: 0.75rem; }
        .text-sm { font-size: 0.875rem; }
        .text-base { font-size: 1rem; }
        .text-lg { font-size: 1.125rem; }
        .text-xl { font-size: 1.25rem; }
        .text-3xl { font-size: 1.875rem; }
        .text-4xl { font-size: 2.25rem; }
        .text-5xl { font-size: 3rem; }
        .font-bold { font-weight: 700; }
        .font-semibold { font-weight: 600; }
        .font-medium { font-weight: 500; }
        .leading-tight { line-height: 1.25; }
        .leading-relaxed { line-height: 1.625; }
        .leading-snug { line-height: 1.375; }
        .tracking-wider { letter-spacing: 0.05em; }
        .uppercase { text-transform: uppercase; }
        .transition-colors { transition: color 0.2s, background-color 0.2s; }
        .transition-shadow { transition: box-shadow 0.2s; }
        .transition-transform { transition: transform 0.2s; }
        .hover\:scale-105:hover { transform: scale(1.05); }
        .hover\:shadow-lg:hover { box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .hover\:shadow-xl:hover { box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .hover\:text-heading:hover { color: var(--color-heading); }
        .hover\:bg-surface-alt:hover { background: var(--color-surface-alt); }
        .group:hover .group-hover\:text-heading { color: var(--color-heading); }
        
        @media (min-width: 768px) {
            .md\:flex { display: flex; }
            .md\:grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
            .md\:grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
            .md\:flex-row { flex-direction: row; }
            .md\:p-14 { padding: 3.5rem; }
        }
        @media (min-width: 1024px) {
            .lg\:grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
            .lg\:text-5xl { font-size: 3rem; }
            .lg\:text-7xl { font-size: 4.5rem; }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Основной контент -->
        <div class="main-content">
            <main>
                {% include "includes/header.html" %}
                {% block content %}{% endblock %}
                {% include "includes/footer.html" %}
            </main>
        </div>
        
        <!-- Боковая панель -->
        <div class="sidebar">
            {% include "includes/sidebar.html" %}
        </div>
    </div>
</body>
</html>
