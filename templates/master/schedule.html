{% extends "base.html" %}
{% block title %}Моё расписание | Руми{% endblock %}
{% block content %}

<section style="padding: 32px 0; background: #f9fafb; min-height: 80vh;">
    <div class="section-container">
        <h1 style="font-size: 1.75rem; font-weight: 700; margin-bottom: 24px;">Моё расписание</h1>
        
        <div id="schedule-container">
            <p style="color: #6B7280; text-align: center; padding: 40px;">Загрузка расписания...</p>
        </div>
    </div>
</section>

<script>
async function loadSchedule() {
    const token = localStorage.getItem('rumi_token');
    if (!token) {
        document.getElementById('schedule-container').innerHTML = 
            '<p style="color: #ef4444; text-align: center; padding: 40px;">Необходимо войти как мастер</p>';
        return;
    }
    
    try {
        const response = await fetch('/api/v1/master/schedule', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        
        if (response.ok) {
            const data = await response.json();
            renderSchedule(data);
        } else {
            document.getElementById('schedule-container').innerHTML = 
                '<p style="color: #ef4444; text-align: center; padding: 40px;">Доступ только для мастеров</p>';
        }
    } catch (e) {
        document.getElementById('schedule-container').innerHTML = 
            '<p style="color: #ef4444; text-align: center; padding: 40px;">Ошибка загрузки</p>';
    }
}

function renderSchedule(data) {
    const container = document.getElementById('schedule-container');
    
    if (!data.bookings || data.bookings.length === 0) {
        container.innerHTML = '<p style="text-align: center; padding: 40px; color: #6B7280;">Нет записей на ближайшее время</p>';
        return;
    }
    
    let html = '<div style="display: flex; flex-direction: column; gap: 12px;">';
    
    data.bookings.forEach(b => {
        html += `
            <div style="background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <p style="font-weight: 600;">${b.client_name || 'Клиент'}</p>
                        <p style="color: #6B7280; font-size: 0.875rem;">${b.start_time} — ${b.end_time}</p>
                    </div>
                    <span style="background: ${b.status === 'confirmed' ? '#d1fae5' : '#fef3c7'}; color: ${b.status === 'confirmed' ? '#065f46' : '#92400e'}; padding: 4px 12px; border-radius: 9999px; font-size: 0.75rem; font-weight: 500;">
                        ${b.status === 'confirmed' ? 'Подтверждена' : 'Ожидает'}
                    </span>
                </div>
            </div>
        `;
    });
    
    html += '</div>';
    container.innerHTML = html;
}

loadSchedule();
</script>
{% endblock %}
