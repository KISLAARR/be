{% extends "base.html" %}
{% block title %}Избранное | Руми{% endblock %}
{% block content %}

<script>
if (!localStorage.getItem('rumi_token')) {
    localStorage.setItem('rumi_redirect_after_login', '/favorites');
    window.location.href = '/login';
}
</script>

<section class="booking-nav-section">
    <div class="section-container">
        <a href="/" class="booking-nav-link">← Главная</a>
    </div>
</section>

<section style="padding: 32px 0; background: var(--color-surface); min-height: 60vh;">
    <div class="section-container">
        <h1 style="font-size: 2rem; font-weight: 700; margin-bottom: 8px;">Избранное</h1>
        <p style="color: var(--color-muted); font-size: 0.9rem; margin-bottom: 24px;">
            Ваши любимые салоны (<span id="fav-count">0</span>)
        </p>
        
        <div id="favorites-list">
            <p style="text-align: center; padding: 40px; color: var(--color-muted);">Загрузка...</p>
        </div>
    </div>
</section>

<script>
async function loadFavorites() {
    const favIds = JSON.parse(localStorage.getItem('rumi_favorites') || '[]');
    document.getElementById('fav-count').textContent = favIds.length;
    
    if (favIds.length === 0) {
        document.getElementById('favorites-list').innerHTML = `
            <div class="empty-state-box">
                <div class="empty-state-icon">❤️</div>
                <h3 class="empty-state-title">Нет избранных салонов</h3>
                <p class="empty-state-desc">Нажмите на сердечко на карточке салона, чтобы добавить его в избранное</p>
                <a href="/salons" class="btn-gradient" style="display: inline-flex; align-items: center; gap: 8px;">
                    Найти салон →
                </a>
            </div>
        `;
        return;
    }
    
    try {
        // Загружаем данные салонов через API
        const response = await fetch('/api/v1/salons');
        const allSalons = await response.json();
        const favSalons = allSalons.filter(s => favIds.includes(s.id));
        
        if (favSalons.length === 0) {
            document.getElementById('favorites-list').innerHTML = '<p style="text-align: center; padding: 40px; color: var(--color-muted);">Избранные салоны не найдены</p>';
            return;
        }
        
        let html = '<div style="display: flex; flex-direction: column; gap: 12px;">';
        
        favSalons.forEach(salon => {
            html += `
                <div class="fav-card">
                    <div class="fav-card-inner">
                        <div class="fav-img">💈</div>
                        <div class="fav-info">
                            <a href="/salons/${salon.id}" style="font-weight: 600; font-size: 1rem; color: var(--color-heading); text-decoration: none;">
                                ${salon.name}
                            </a>
                            <p style="color: var(--color-muted); font-size: 0.8rem; margin-top: 4px;">📍 ${salon.address}</p>
                            <div style="display: flex; align-items: center; gap: 6px; margin-top: 6px;">
                                <span style="color: #fbbf24;">⭐</span>
                                <span style="font-weight: 600; font-size: 0.9rem;">${salon.rating}</span>
                                <span style="color: var(--color-muted); font-size: 0.8rem;">(${salon.reviews_count} отзывов)</span>
                            </div>
                            <button onclick="removeFavorite(${salon.id})" class="fav-remove-btn">
                                ✕ Убрать из избранного
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
        
        html += '</div>';
        document.getElementById('favorites-list').innerHTML = html;

    } catch (e) {
        document.getElementById('favorites-list').innerHTML = '<p style="text-align: center; padding: 40px; color: #ef4444;">Ошибка загрузки</p>';
    }
}

function removeFavorite(salonId) {
    let favs = JSON.parse(localStorage.getItem('rumi_favorites') || '[]');
    favs = favs.filter(id => id !== salonId);
    localStorage.setItem('rumi_favorites', JSON.stringify(favs));
    loadFavorites();
}

loadFavorites();
</script>
{% endblock %}
