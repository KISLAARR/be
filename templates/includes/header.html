<header class="sticky top-0 z-30 border-b bg-surface">
    <nav class="section-container flex items-center justify-between py-3">
        <a class="text-xl font-bold" href="/">
            <span style="color: var(--color-primary);">руми.</span>
        </a>
        <div class="flex items-center gap-3">
            <a class="btn-primary rounded-full text-sm" href="/salons">Выбрать салон</a>
            
            <!-- Если пользователь авторизован — показываем имя -->
            <span id="user-greeting" style="display: none; font-weight: 500; font-size: 0.875rem; color: #111827;">
                👤 <span id="user-name-display">Гость</span>
            </span>
            
            <!-- Если не авторизован — показываем кнопку Войти -->
            <a id="login-btn" href="/login" style="color: #6B7280; text-decoration: none; font-size: 0.875rem; font-weight: 500; border: 1px solid #e5e7eb; border-radius: 9999px; padding: 8px 18px;"
               onmouseover="this.style.borderColor='#F28C6F'; this.style.color='#F28C6F'"
               onmouseout="this.style.borderColor='#e5e7eb'; this.style.color='#6B7280'">
                Войти
            </a>
            
            <!-- Кнопка Выйти (показывается только после входа) -->
            <a id="logout-btn" href="#" onclick="logout()" style="display: none; color: #ef4444; text-decoration: none; font-size: 0.8rem; font-weight: 500; margin-left: 8px;">
                Выйти
            </a>
        </div>
    </nav>
</header>

<script>
// Проверяем авторизацию при загрузке
(function() {
    const token = localStorage.getItem('rumi_token');
    const userName = localStorage.getItem('rumi_user_name');
    
    if (token && userName) {
        // Авторизован — скрываем кнопку "Войти", показываем имя
        document.getElementById('login-btn').style.display = 'none';
        document.getElementById('user-greeting').style.display = 'inline';
        document.getElementById('user-name-display').textContent = userName;
        document.getElementById('logout-btn').style.display = 'inline';
    }
})();

function logout() {
    localStorage.removeItem('rumi_token');
    localStorage.removeItem('rumi_user_id');
    localStorage.removeItem('rumi_user_name');
    window.location.href = '/';
}
</script>
