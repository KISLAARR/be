version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: beauty_db
    environment:
      POSTGRES_USER: beauty_user
      POSTGRES_PASSWORD: beauty_pass_2026
      POSTGRES_DB: beauty_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beauty_user -d beauty_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local