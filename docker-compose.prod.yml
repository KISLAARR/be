# Прод-стек: app (gunicorn) + Redis + Caddy (авто-TLS).
# PostgreSQL — управляемая БД Timeweb (НЕ контейнер): host/port/user/pass
# берутся из .env (POSTGRES_HOST должен указывать на хост из панели Timeweb).
# Запуск:
#   1) заполнить .env (SECRET_KEY, POSTGRES_*, DOMAIN, CORS_ORIGINS)
#   2) сгенерировать боевые ключи: python -m app.scripts.gen_keys (в ./keys)
#   3) миграции:  docker compose -f docker-compose.prod.yml run --rm app alembic upgrade head
#   4) docker compose -f docker-compose.prod.yml up -d
services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    image: rumi-app:latest
    env_file: .env
    environment:
      # переопределяем локальные значения из .env под контейнерную сеть
      ENVIRONMENT: production
      COOKIE_SECURE: "true"
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["https://${DOMAIN:-localhost}"]'
      WEB_CONCURRENCY: "2"
    volumes:
      - ./keys:/app/keys:ro           # RS256-ключи монтируем, не пекём в образ
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Фоновые задачи (блок 06): тот же образ, вместо gunicorn — arq-воркер.
  # Задачи и настройки: app/tasks.py + app/core/worker.py
  arq-worker:
    image: rumi-app:latest
    env_file: .env
    command: ["arq", "app.core.worker.WorkerSettings"]
    environment:
      ENVIRONMENT: production
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./keys:/app/keys:ro           # понадобятся задачам, работающим с БД/токенами
    depends_on:
      redis:
        condition: service_healthy
    # HEALTHCHECK из Dockerfile проверяет /health веб-приложения — для
    # воркера заменяем на штатную проверку arq (health-ключ в Redis).
    healthcheck:
      test: ["CMD", "arq", "--check", "app.core.worker.WorkerSettings"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
